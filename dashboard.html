<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qiddiya Resort Core District | Dashboard</title>

<!-- Brand Font -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #294145;
  --secondary: #5D855E;
  --accent: #86B85E;
  --light: #E6F0DE;
  --muted: #666666;
  --white: #FFFFFF;
  --bg: #F9F9F9;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Oswald", sans-serif;
  background:
    radial-gradient(circle at top left, var(--light), transparent 60%),
    radial-gradient(circle at bottom right, #dfeee0, transparent 55%),
    var(--bg);
  min-height: 100vh;
  padding: 20px;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 1400px;
  background: var(--white);
  padding: 28px;
  border-radius: 18px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.08);
}

.header {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 10px;
}

.header img {
  width: 130px;
}

.titles {
  text-align: center;
  margin-bottom: 28px;
}

.title {
  font-size: 26px;
  font-weight: 500;
  color: var(--primary);
}

.subtitle {
  font-size: 15px;
  font-weight: 300;
  color: var(--muted);
}

.section {
  margin-top: 20px;
  padding: 18px;
  background: #F9F9F9;
  border-radius: 14px;
  border: 1px solid #eee;
}

.section-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--primary);
  margin-bottom: 14px;
}

/* Power BI */
.dashboard-frame {
  width: 100%;
  height: 820px;
  border: none;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.12);
}

/* Footer */
.footer {
  margin-top: 22px;
  padding-top: 14px;
  border-top: 1px solid #eee;
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  font-weight: 300;
}

.footer a {
  color: var(--primary);
  text-decoration: none;
}

.footer a:hover {
  text-decoration: underline;
}

@media (max-width: 600px) {
  .dashboard-frame {
    height: 480px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="https://infinitehse.b-cdn.net/Companies%20Logos/IES_logo_with_Qiddiya.png" alt="Logo">
  </div>

  <div class="titles">
    <div class="title">Qiddiya Resort Core District</div>
    <div class="subtitle">Environmental Dashboard</div>
  </div>

  <div class="section">
    <div class="section-title">Power BI Dashboard</div>

    
    <iframe class="dashboard-frame" src="https://app.powerbi.com/view?r=eyJrIjoiZmFhZjhlNjUtMWYyZi00ZmRlLWE4NTAtODljNDBjOWZjOTljIiwidCI6ImQwMDhlNDVkLTA2NTYtNDFmNy05MDUwLTM5YzVjMTJhMTIwOCIsImMiOjl9"></iframe>

  </div>

  <div class="footer">
    This solution was developed by
    <a href="https://infinitehse.com/" target="_blank" rel="noopener">Infinite HSE</a>
  </div>

</div>

</body>
</html>
